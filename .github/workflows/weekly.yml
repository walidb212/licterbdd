name: Weekly monitors (heavy)

on:
  # schedule:
  #   - cron: '0 4 * * 0'  # dimanche 4h UTC
  workflow_dispatch:  # lancement manuel uniquement pour l'instant

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run weekly monitors
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python -m prod_pipeline --brand both \
            --steps store_monitor,review_monitor,context_monitor

      - name: Upload run data
        uses: actions/upload-artifact@v4
        with:
          name: weekly-${{ github.run_id }}
          path: data/
          retention-days: 30
