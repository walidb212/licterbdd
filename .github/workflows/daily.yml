name: Daily monitors

on:
  # schedule:
  #   - cron: '0 6 * * *'  # tous les jours a 6h UTC
  workflow_dispatch:  # lancement manuel uniquement pour l'instant

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily monitors
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python -m prod_pipeline --brand both \
            --steps news_monitor,reddit_monitor,youtube_monitor,x_monitor,ai_batch

      - name: Upload run data
        uses: actions/upload-artifact@v4
        with:
          name: daily-${{ github.run_id }}
          path: data/
          retention-days: 30
